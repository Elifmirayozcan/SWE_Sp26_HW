version: 2.1
orbs:
  python: circleci/python@2.1.1
workflows:
  build-and-test:
    jobs:
      - build-and-test
      - deploy:
          requires:
            - build-and-test
jobs:
  build-and-test:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
      - run:
          name: Run Tests
          command: PYTHONPATH=. python -m unittest discover -s tests
  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Deploy to Render
          command: |
            if [ -n "${RENDER_DEPLOY_HOOK}" ]; then
              curl -X POST "${RENDER_DEPLOY_HOOK}"
            else
              echo "RENDER_DEPLOY_HOOK is not set. Skipping deployment."
            fi
